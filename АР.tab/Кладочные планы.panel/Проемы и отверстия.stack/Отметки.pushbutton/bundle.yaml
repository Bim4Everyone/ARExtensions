title:
  ru: Отметки
  en_us: Elevations

tooltip:
  ru: >-
    Заполняет у проемов и отверстий параметры:
    
    - "ФОП_Отметка от нуля";
    
    - "ФОП_Отметка от плиты КР";
    
    - "ФОП_Отметка от уровня";
    
    - "ФОП_Группирование".
    
    Перед запуском выберите проемы для работы.

  en_us: >-
    Fills in the parameters for openings and holes:
    
    - "ФОП_Отметка от нуля";
    
    - "ФОП_Отметка от плиты КР";
    
    - "ФОП_Отметка от уровня";
    
    - "ФОП_Группирование".
    
    Before starting, select openings for work.

